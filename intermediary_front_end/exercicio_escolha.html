<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trabalhando com o DOM</title>
  </head>

  <body>
    <div class="estilo">div com estilo</div>
    <div class="estilo">div com estilo 2</div>
    <p class="estilo">Elemento p com estilo</p>
    <p>Isto é <span class="estilo"> elemento span</span> dentro de um p</p>
  </body>

  <script>
    let classEstilo = document.getElementsByClassName("estilo");

    for (let elem of classEstilo) {
      elem.style.background = "blue";
      elem.style.color = "white";
      elem.innerText = elem.innerText.toUpperCase();
    }
  </script>
</html>
