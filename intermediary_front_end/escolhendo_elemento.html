<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escolhendo Elementos</title>
  </head>
  <body>
    <h1>Usando seletor do DOM</h1>
    <ul>
      <li>Java</li>
      <li>Python</li>
      <li>NodeJS</li>
    </ul>

    <div id="conteudo" name="divConteudo" class="mensagem"></div>
    <div id="conteudo2" name="divConteudo" class="mensagem"></div>
    <div class="mensagem"></div>

    <span id="novospan" class="novo">Testo do SPAN</span>

    <div class="mensagem"></div>
  </body>

  <script>
    elemento0 = document.getElementsByTagName("li")[0];
    elemento0.style.color = "blue";

    elemento1 = document.getElementsByTagName("li")[1];
    elemento1.style.background = "red";

    elemento2 = document.getElementsByTagName("li")[2];
    elemento2.innerText = "Springboot";

    elementoDiv = document.getElementById("conteudo");
    elementoDiv.innerHTML = "<p> Estou colocando a tag p dentro da div </p>";

    elementoName = document.getElementsByName("divConteudo")[1];
    elementoName.style.color = "green";
    elementoName.innerHTML = "Estou colocando algo";

    elementoClass = document.getElementsByClassName("mensagem")[2];
    elementoClass.innerHTML = "<h2>Teste</h2>";

    elementoSpan = document.querySelector("span.novo");
    elementoSpan.style.color = "yellow";

    elementoSeletor = document.querySelectorAll(".mensagem");
    elementoSeletor[3].innerHTML = "<h3> Teste incluido </h3>";
  </script>
</html>
